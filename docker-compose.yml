name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Select the Playwright project/scope to run"
        required: true
        default: "all"
        type: choice
        options:
          - api
          - chromium
          - firefox
          - webkit
          - smoke
          - all
      local_test:
        description: "Running locally via act (skips GitHub-only steps)"
        required: false
        default: "false"
        type: boolean

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high

      - name: Scan for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . --verbose

      - name: Initialize CodeQL
        if: ${{ !inputs.local_test && !env.ACT }}
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Run CodeQL analysis
        if: ${{ !inputs.local_test && !env.ACT }}
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Lint Dockerfile with Hadolint
        if: ${{ !inputs.local_test && !env.ACT }}
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ !inputs.local_test && !env.ACT && (success() || failure()) }}
        with:
          sarif_file: hadolint-results.sarif
          category: dockerfile-lint

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build test-runner
        env:
          DOCKER_BUILDKIT: 1

      - name: Scan Docker image for CVEs with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fedemotests-test-runner:latest
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ !inputs.local_test && !env.ACT && (success() || failure()) }}
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Scan filesystem for misconfigurations with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: misconfig,secret

      - name: Upload Trivy filesystem scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ !inputs.local_test && !env.ACT && (success() || failure()) }}
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fedemotests-test-runner:latest
          format: cyclonedx
          output: sbom.cyclonedx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90

  test:
    name: Run Playwright Tests (${{ github.event.inputs.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [security-scan, docker-scan]
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create output directories
        run: |
          mkdir -p test-results playwright-report
          chmod -R 777 test-results playwright-report

      - name: Run Tests in Docker Container
        run: |
          BASE_CMD="docker compose run --rm --remove-orphans test-runner npx playwright test"

          if [ "${{ github.event.inputs.project }}" = "all" ]; then
            $BASE_CMD
          elif [ "${{ github.event.inputs.project }}" = "smoke" ]; then
            $BASE_CMD --grep @smoke
          else
            $BASE_CMD --project=${{ github.event.inputs.project }}
          fi
        env:
          CI: true
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results (${{ github.event.inputs.project }})
          path: "test-results/**/*.xml"
          reporter: "java-junit"
          fail-on-error: false

      - name: Publish HTML Report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: playwright-report
          keep_files: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.event.inputs.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
