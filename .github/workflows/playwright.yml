name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run tests on"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high

      - name: Scan for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . --verbose

      - name: Initialize CodeQL
        if: ${{ !env.ACT }}
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CodeQL analysis
        if: ${{ !env.ACT }}
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run Playwright Tests (${{ github.event.inputs.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: security-scan
    permissions:
      contents: write   # required for gh-pages publish
      checks: write     # required for dorny/test-reporter
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Tests in Docker Container
        run: |
          if [ "${{ github.event.inputs.browser }}" = "all" ]; then
            docker compose run --rm --remove-orphans test-runner npx playwright test
          else
            docker compose run --rm --remove-orphans test-runner npx playwright test --project=${{ github.event.inputs.browser }}
          fi
        env:
          CI: true
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results (${{ github.event.inputs.browser }})
          path: 'test-results/**/*.xml'
          reporter: 'java-junit'   
          fail-on-error: false     # don't fail the job if no report files found

      - name: Publish HTML Report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: playwright-report  # avoids overwriting root gh-pages content
          keep_files: true                    # preserves previous reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.event.inputs.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14