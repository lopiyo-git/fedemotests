name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Select the Playwright project/scope to run"
        required: true
        default: "all"
        type: choice
        options:
          - api
          - chromium
          - firefox
          - webkit
          - smoke
          - all

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high

      - name: Scan for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . --verbose

      - name: Initialize CodeQL
        if: ${{ !env.ACT }}
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Run CodeQL analysis
        if: ${{ !env.ACT }}
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  test:
    name: Run Playwright Tests (${{ github.event.inputs.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Docker build ~5min + longest browser suite ~35min
    needs: security-scan
    permissions:
      contents: write        # required for gh-pages publish
      checks: write          # required for dorny/test-reporter
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create output directories
        run: |
          mkdir -p test-results playwright-report
          chmod -R 777 test-results playwright-report

      - name: Run Tests in Docker Container
        run: |
          BASE_CMD="docker compose run --rm --remove-orphans test-runner npx playwright test"

          if [ "${{ github.event.inputs.project }}" = "all" ]; then
            # Runs all projects defined in playwright.config.js
            $BASE_CMD
          elif [ "${{ github.event.inputs.project }}" = "smoke" ]; then
            # Runs any test tagged with @smoke across all projects
            $BASE_CMD --grep @smoke
          else
            # Standard browser/project selection (chromium, firefox, webkit, api)
            $BASE_CMD --project=${{ github.event.inputs.project }}
          fi
        env:
          CI: true
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results (${{ github.event.inputs.project }})
          path: 'test-results/**/*.xml'
          reporter: 'java-junit'
          fail-on-error: false

      - name: Publish HTML Report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: playwright-report
          keep_files: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.event.inputs.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14