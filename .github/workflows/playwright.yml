name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Select the Playwright project/scope to run"
        required: true
        default: "all"
        type: choice
        options:
          - api
          - chromium
          - firefox
          - webkit
          - smoke
          - all
      local_test:
        description: "Running locally via act (skips GitHub-only steps)"
        required: false
        default: "false"
        type: boolean

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high

      - name: Scan for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . --verbose

      - name: Initialize CodeQL
        if: github.event.inputs.local_test != 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Run CodeQL analysis
        if: github.event.inputs.local_test != 'true'
        uses: github/codeql-action/analyze@v3

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build test-runner
        env:
          DOCKER_BUILDKIT: 1

      - name: Scan Docker image for CVEs with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fedemotests-test-runner:latest
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy image scan results
        if: github.event.inputs.local_test != 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [security-scan, docker-scan]
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output directories
        run: |
          mkdir -p test-results playwright-report
          chmod -R 777 test-results playwright-report

      - name: Run Tests in Docker Container
        run: |
          BASE_CMD="docker compose run --rm --remove-orphans test-runner npx playwright test"
          if [ "$PROJECT" = "all" ]; then
            $BASE_CMD
          elif [ "$PROJECT" = "smoke" ]; then
            $BASE_CMD --grep @smoke
          else
            $BASE_CMD --project="$PROJECT"
          fi
        env:
          CI: true
          PROJECT: ${{ github.event.inputs.project }}

      - name: Publish HTML Report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: playwright-report
          keep_files: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14